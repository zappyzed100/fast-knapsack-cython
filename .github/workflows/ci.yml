name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    env:
      MPLBACKEND: Agg
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Setup uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run unit tests (solution_eval)
        run: uv run python -m unittest tests/test_solution_eval.py -v

  solver-smoke-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    timeout-minutes: 20
    env:
      MPLBACKEND: Agg
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Setup uv
        uses: astral-sh/setup-uv@v3

      - name: Install MiniZinc
        run: |
          sudo apt-get update
          sudo apt-get install -y minizinc

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run 3-solver smoke tests (timeout=5)
        run: uv run python -m unittest tests/test_solvers_smoke.py -v